<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Мій Список Справ</h1>

    <form id="todo-form">
        <input type="text" id="todo-input" placeholder="Що потрібно зробити?" required minlength="2">
        <button type="submit" id="add-btn">Додати</button>
    </form>

    <div class="controls">
        <label for="sort-select">Сортувати за:</label>
        <select id="sort-select">
            <option value="dateCreated">Датою додавання</option>
            <option value="dateUpdated">Датою оновлення</option>
            <option value="status">Станом (виконані в кінці)</option>
        </select>
    </div>

    <ul id="todo-list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
